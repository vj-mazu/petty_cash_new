services:
  - type: web
    name: petti-cash-backend
    env: node
    buildCommand: cd backend && npm install
    startCommand: cd backend && node start.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: petti-cash-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: PORT
        value: 5000
      - key: CLIENT_URL

databases:
  - name: petti-cash-db
    plan: free
